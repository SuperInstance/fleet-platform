name = "fleet-gateway"
main = "src/index.ts"
compatibility_date = "2026-07-18"

[[d1_databases]]
binding = "DB"
database_name = "fleet-data"
database_id = "37f14cd0-53d4-4c98-90e2-8a6175031728"

[[vectorize]]
binding = "VECTORIZE"
index_name = "fleet-embeddings"
dimensions = 384

[[kv_namespaces]]
binding = "CACHE"
id = "76094ed27a6447d1bf5627bf33e71fb9"

[ai]
binding = "AI"

routes = [
  { pattern = "api.fleet.superinstance.ai/*", zone_name = "superinstance.ai" }
]
